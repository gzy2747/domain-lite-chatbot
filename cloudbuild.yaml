# Replace my-app with your app name in all 4 places (done: domain-lite-chatbot)
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/domain-lite-chatbot', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/domain-lite-chatbot']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'domain-lite-chatbot'
      - '--image=gcr.io/$PROJECT_ID/domain-lite-chatbot'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
